spring:
  application:
    name: backend-java
  datasource:
    url: jdbc:postgresql://localhost:9508/shopease
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8085
  servlet:
    context-path: /api
